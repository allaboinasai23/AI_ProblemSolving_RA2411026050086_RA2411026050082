<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Problem Solving — Games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f1a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:center;gap:1rem;padding:.75rem 1rem;background:#1a1a2e;border-bottom:1px solid rgba(255,255,255,.08);z-index:10;flex-shrink:0}
.topbar h1{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:1rem}
.tab{padding:.5rem 1.5rem;border:none;border-radius:2rem;background:transparent;color:#888;font-family:'Inter',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .3s}
.tab.active{background:linear-gradient(135deg,#6c63ff,#ff6584);color:#fff;box-shadow:0 4px 15px rgba(108,99,255,.3)}
.tab:hover:not(.active){color:#e0e0e0}
.game-frame{flex:1;width:100%;border:none}
</style>
</head>
<body>
<div class="topbar">
 <h1>AI Problem Solving</h1>
 <button class="tab active" id="tabTTT" onclick="switchGame('ttt')">🎮 Tic-Tac-Toe</button>
 <button class="tab" id="tabSudoku" onclick="switchGame('sudoku')">🧩 Sudoku</button>
</div>
<iframe class="game-frame" id="gameFrame" src="/tictactoe"></iframe>
<script>
function switchGame(g){
 document.getElementById('tabTTT').classList.toggle('active',g==='ttt');
 document.getElementById('tabSudoku').classList.toggle('active',g==='sudoku');
 document.getElementById('gameFrame').src = g==='ttt'?'/tictactoe':'/sudoku';
}
</script>
</body>
</html>
